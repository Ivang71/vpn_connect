<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VPN Connect</title>
    <style>
      :root {
        --bg: #000000;
        --text: #0f172a;
        --btn: #0f766e;
        --btn-hover: #14b8a6;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Avenir Next", "Segoe UI", "Trebuchet MS", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      a.connect-vpn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: fit-content;
        padding: 0.95rem 1.6rem;
        border-radius: 10px;
        border: 0;
        text-decoration: none;
        color: #ecfeff;
        background: linear-gradient(140deg, #0f172a 0%, var(--btn) 100%);
        font-size: 1.05rem;
        font-weight: 600;
        letter-spacing: 0.01em;
        box-shadow:
          inset 0 0 0 2px rgba(20, 184, 166, 0.35),
          0 16px 30px rgba(0, 255, 245, 0.2);
        transition: transform 0.18s ease,
          box-shadow 0.2s ease,
          background 0.2s ease,
          filter 0.2s ease;
      }

      a.connect-vpn:hover,
      a.connect-vpn:focus-visible {
        background: var(--btn-hover);
        transform: translateY(-1px);
        box-shadow:
          inset 0 0 0 2px rgba(20, 184, 166, 0.65),
          0 20px 38px rgba(20, 184, 166, 0.35);
        outline-offset: 2px;
        outline: none;
      }

      a.connect-vpn:active {
        transform: translateY(0);
      }

      .location-list {
        list-style: none;
        margin: 0;
        padding: 0;
        width: min(92vw, 560px);
      }

      .location-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        padding: 1rem 1.2rem;
        border-radius: 14px;
        background: rgba(8, 24, 30, 0.72);
        box-shadow: inset 0 0 0 1px rgba(20, 184, 166, 0.22),
          0 8px 22px rgba(0, 255, 245, 0.2);
      }

      .location-text {
        font-size: 1.02rem;
        color: #e2e8f0;
      }

      .error-message {
        display: none;
        color: #fecaca;
        text-align: center;
        font-size: 1.02rem;
      }
    </style>
  </head>
